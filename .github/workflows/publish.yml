name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build package
        run: uv build

      - name: Verify static files in wheel
        run: |
          python3 -c "
          import zipfile, sys, pathlib
          wheels = list(pathlib.Path('dist').glob('*.whl'))
          if not wheels:
              print('ERROR: No wheel found in dist/')
              sys.exit(1)
          with zipfile.ZipFile(wheels[0]) as zf:
              static_files = [n for n in zf.namelist() if '/static/' in n]
              print(f'Found {len(static_files)} static files in wheel')
              if not static_files:
                  print('ERROR: No static files found — frontend not bundled')
                  sys.exit(1)
              for f in static_files[:10]:
                  print(f'  {f}')
              if len(static_files) > 10:
                  print(f'  ... and {len(static_files) - 10} more')
          "

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python3 - "$VERSION" <<'PY' > release_notes.md
          import re, sys, pathlib
          version = sys.argv[1]
          text = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")
          pattern = rf"## \[{re.escape(version)}\][^\n]*\n(.*?)(?=\n## |\Z)"
          m = re.search(pattern, text, re.DOTALL)
          sys.stdout.write(m.group(1).strip() if m else f"Release v{version}")
          PY

      # Create the GitHub Release when the operator hasn't already done
      # it manually, otherwise just attach the build artifacts. Uploading
      # the wheel + sdist + attestations to the release page is what we
      # actually need here; the release itself is cheap to create and the
      # operator sometimes beats the workflow to it.
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; uploading build artifacts."
            gh release upload "$TAG" dist/* --clobber
          else
            echo "Creating release $TAG."
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file release_notes.md \
              dist/*
          fi
